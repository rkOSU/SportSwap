name: Feature request
description: Propose a product or engineering improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user, supplier, or operator problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change in the product or codebase?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Marketplace browse
        - Listing creation
        - Booking requests
        - Supabase/schema
        - Visual design
        - Dev tooling
        - Deployment
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Links, sketches, screenshots, constraints, or rollout considerations.
